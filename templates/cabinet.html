<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Личный кабинет</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            padding: 40px;
        }

        .box {
            max-width: 900px;
            margin: 0 auto;
            background: #fff;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }

        .top {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h2 {
            margin: 0;
        }

        .logout {
            text-decoration: none;
            color: #b00020;
        }

        form {
            margin-top: 20px;
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            align-items: end;
        }

        label {
            font-size: 13px;
        }

        input[type="date"] {
            padding: 6px;
        }

        button {
            padding: 8px 14px;
            cursor: pointer;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 24px;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: left;
        }

        th {
            background: #f7f7f7;
        }

        .total {
            margin-top: 16px;
            font-weight: bold;
        }

        .error {
            color: #b00020;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="box">

    <div class="top">
        <h2>Личный кабинет</h2>
        <a href="/logout" class="logout">Выйти</a>
    </div>

    <p><strong>{{ user.employee_name }}</strong></p>

    <form method="get" action="/cabinet">
        <div>
            <label>С:</label><br>
            <input type="date" name="date_from" value="{{ date_from }}">
        </div>

        <div>
            <label>По:</label><br>
            <input type="date" name="date_to" value="{{ date_to }}">
        </div>

        <div>
            <button type="submit">Показать</button>
        </div>
    </form>

    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}

    <table>
        <thead>
            <tr>
                <th>Дата</th>
                <th>Часы</th>
            </tr>
        </thead>
        <tbody>
            {% for shift in shifts %}
            <tr>
                <td>{{ shift.shift_date }}</td>
                <td>{{ shift.hours }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

    <div class="total">
        Итого: {{ total_hours }} часов
    </div>

</div>

</body>
</html>
