<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в личный кабинет</title>
    <style>
        :root {
            --brand-blue: #0b1475;
            --brand-peach: #f58a65;
            --bg: #f4f5f7;
            --card-bg: #ffffff;
            --text: #1e2430;
            --muted: #6b7280;
            --border: #e6e8ee;
            --error-bg: #fff1ed;
            --error-text: #b42318;
            --shadow: 0 18px 50px rgba(11, 20, 117, 0.10);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background:
                radial-gradient(circle at top left, rgba(245, 138, 101, 0.12), transparent 28%),
                radial-gradient(circle at bottom right, rgba(11, 20, 117, 0.08), transparent 32%),
                var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .auth-wrap {
            width: 100%;
            max-width: 460px;
        }

        .auth-card {
            background: var(--card-bg);
            border-radius: 24px;
            box-shadow: var(--shadow);
            padding: 34px 30px 30px;
            border: 1px solid rgba(11, 20, 117, 0.05);
        }

        .logo-wrap {
            display: flex;
            justify-content: center;
            margin-bottom: 18px;
        }

        .logo-wrap img {
            width: 112px;
            height: 112px;
            object-fit: contain;
            display: block;
        }

        .title {
            margin: 0;
            text-align: center;
            font-size: 30px;
            line-height: 1.1;
            color: var(--brand-blue);
            font-weight: 700;
        }

        .subtitle {
            margin: 10px 0 26px;
            text-align: center;
            color: var(--muted);
            font-size: 14px;
            line-height: 1.5;
        }

        .field {
            margin-bottom: 16px;
        }

        .field label {
            display: block;
            font-size: 13px;
            font-weight: 700;
            color: var(--brand-blue);
            margin-bottom: 8px;
        }

        .field input {
            width: 100%;
            height: 50px;
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 0 15px;
            font-size: 15px;
            color: var(--text);
            background: #fff;
            outline: none;
            transition: border-color .2s, box-shadow .2s;
        }

        .field input:focus {
            border-color: rgba(11, 20, 117, 0.35);
            box-shadow: 0 0 0 4px rgba(11, 20, 117, 0.08);
        }

        .error {
            margin-bottom: 16px;
            background: var(--error-bg);
            color: var(--error-text);
            border: 1px solid rgba(180, 35, 24, 0.14);
            border-radius: 14px;
            padding: 12px 14px;
            font-size: 14px;
            line-height: 1.4;
        }

        .btn {
            width: 100%;
            height: 52px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, var(--brand-blue), #18239a);
            color: #fff;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: transform .06s ease, box-shadow .2s ease, opacity .2s ease;
            box-shadow: 0 10px 24px rgba(11, 20, 117, 0.22);
        }

        .btn:hover {
            opacity: 0.97;
        }

        .btn:active {
            transform: translateY(1px);
        }

        .footer-note {
            text-align: center;
            margin-top: 18px;
            font-size: 12px;
            color: var(--muted);
        }

        .accent-line {
            width: 64px;
            height: 6px;
            border-radius: 999px;
            background: var(--brand-peach);
            margin: 14px auto 0;
        }

        @media (max-width: 520px) {
            .auth-card {
                padding: 26px 20px 22px;
                border-radius: 20px;
            }

            .logo-wrap img {
                width: 96px;
                height: 96px;
            }

            .title {
                font-size: 26px;
            }
        }
    </style>
</head>
<body>
    <div class="auth-wrap">
        <div class="auth-card">
            <div class="logo-wrap">
                <img src="/static/logo-alex.jpg" alt="Логотип">
            </div>

            <h1 class="title">Личный кабинет</h1>
            <div class="accent-line"></div>
            <p class="subtitle">
                Введите телефон и пароль, чтобы войти в систему
            </p>

            {% if error %}
                <div class="error">{{ error }}</div>
            {% endif %}

            <form method="post" action="/login">
                <div class="field">
                    <label for="phone">Телефон</label>
                    <input
                        id="phone"
                        type="text"
                        name="phone"
                        placeholder="Введите телефон"
                        required
                    >
                </div>

                <div class="field">
                    <label for="password">Пароль</label>
                    <input
                        id="password"
                        type="password"
                        name="password"
                        placeholder="Введите пароль"
                        required
                    >
                </div>

                <button type="submit" class="btn">Войти</button>
            </form>

            <div class="footer-note">
                Защищённый доступ к данным сотрудника
            </div>
        </div>
    </div>
</body>
</html>
